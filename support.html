<script>
        document.getElementById('staff-exam-form').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const submitButton = document.getElementById('submit-btn');
            submitButton.disabled = true;
            submitButton.innerText = "جاري إرسال طلبك...";

            // ⚠️ حط رابط الـ Webhook الحقيقي بتاع سيرفرك هنا:
            const webhookURL = "https://discord.com/api/webhooks/1519774590530748597/PQtbBv8vj848OeKFq1hZhPPUXZ8I51vkJIhW5TjQYMMjsu0QXWy-QM1lvU7QXoIpQ5Gs"; 

            // تجميع البيانات
            const username = document.getElementById('discord-username').value;
            const age = document.getElementById('user-age').value;
            const q1Answer = document.querySelector('input[name="q1"]:checked')?.value || "لم يتم اختيار إجابة";
            const q2Answer = document.querySelector('input[name="q2"]:checked')?.value || "لم يتم اختيار إجابة";
            const q3Answer = document.getElementById('essay-q3').value;
            const q4Answer = document.getElementById('essay-q4').value;

            // تجهيز الـ Embed
            const discordPayload = {
                username: "Nexus Vanguard Bot",
                embeds: [{
                    title: "📝 تقديم جديد على رتبة إدارة! (Staff Application)",
                    description: `قام اللاعب **${username}** بتقديم طلب انضمام جديد للإدارة من خلال الموقع الرسمي.`,
                    color: 5793266, 
                    fields: [
                        { name: "👤 اسم المستخدم:", value: username, inline: true },
                        { name: "⏳ العمر:", value: age, inline: true },
                        { name: "───────────────────────", value: "📋 **إجابات الأسئلة الاختيارية:**" },
                        { name: "❓ السؤال 1: إذا قام لاعب بسبّ إداري داخل التكت الخاص به، ما الإجراء الصحيح؟", value: `🔹 **إجابة اللاعب:** ${q1Answer}` },
                        { name: "❓ السؤال 2: رأيت إدارياً من رتبة أعلى منك يخترق القوانين أمام اللاعبين، ماذا تفعل؟", value: `🔹 **إجابة اللاعب:** ${q2Answer}` },
                        { name: "───────────────────────", value: "📝 **إجابات الأسئلة الشرح والمقالي:**" },
                        { name: "❓ السؤال 3: لماذا ترى نفسك مناسباً للإدارة وما الذي ستضيفه؟", value: `💬 ${q3Answer}` },
                        { name: "❓ السؤال 4: اشرح بالتفصيل كيف ستتصرف إذا حدثت مشاجرة بين طاقم الدعم الفني؟", value: `💬 ${q4Answer}` }
                    ],
                    footer: { text: "Nexus Vanguard System" },
                    timestamp: new Date().toISOString()
                }]
            };

            // الإرسال الرسمي متوافق مع السيرفرات والجيتهاب
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(discordPayload)
            })
            .then(response => {
                if (response.ok) {
                    alert('🔥 أسطوري! تم إرسال طلبك بنجاح ووصل لغرفة الإدارة في الديسكورد.');
                    document.getElementById('staff-exam-form').reset();
                } else {
                    alert('❌ الـ Webhook فيه مشكلة أو غير صحيح، تأكد من إعدادات الروم في ديسكورد.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('❌ حصلت مشكلة في الاتصال بالديسكورد.');
            })
            .finally(() => {
                submitButton.disabled = false;
                submitButton.innerHTML = '<span>تقديم الطلب الآن</span> <i class="fa-solid fa-paper-plane"></i>';
            });
        });
    </script>
